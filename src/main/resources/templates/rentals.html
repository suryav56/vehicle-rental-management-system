<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rental List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            🚗 Vehicle Rental
        </a>

        <div class="navbar-nav">

            <a class="nav-link" href="/">Dashboard</a>

            <a class="nav-link" href="/vehicles">Vehicles</a>

            <a class="nav-link" href="/customers">Customers</a>

            <a class="nav-link" href="/rentals">Rentals</a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2>Rental List</h2>

    <a href="/addRental" class="btn btn-primary mb-3">
        New Rental
    </a>

    <table class="table table-bordered">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Vehicle</th>
            <th>Customer</th>
            <th>Rent Date</th>
            <th>Return Date</th>
            <th>Total Amount</th>
            <th>Status</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="rental : ${rentals}">

            <td th:text="${rental.id}"></td>
            <td th:text="${rental.vehicle.brand + ' ' + rental.vehicle.model}"></td>
            <td th:text="${rental.customer.name}"></td>
            <td th:text="${rental.rentDate}"></td>
            <td th:text="${rental.returnDate}"></td>
            <td th:text="${rental.totalAmount}"></td>
            <td th:text="${rental.status}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
