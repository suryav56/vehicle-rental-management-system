<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Rent Vehicle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            🚗 Vehicle Rental
        </a>

        <div class="navbar-nav">

            <a class="nav-link" href="/">Dashboard</a>

            <a class="nav-link" href="/vehicles">Vehicles</a>

            <a class="nav-link" href="/customers">Customers</a>

            <a class="nav-link" href="/rentals">Rentals</a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2>Rent a Vehicle</h2>

    <form th:action="@{/saveRental}"
          th:object="${rental}"
          method="post">

        <div class="mb-3">

            <label>Vehicle</label>

            <select class="form-select"
                    name="vehicleId">

                <option
                        th:each="vehicle : ${vehicles}"
                        th:value="${vehicle.id}"
                        th:text="${vehicle.brand + ' ' + vehicle.model}">
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>Customer</label>

            <select class="form-select"
                    name="customerId">

                <option
                        th:each="customer : ${customers}"
                        th:value="${customer.id}"
                        th:text="${customer.name}">
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>Rent Date</label>

            <input type="date"
                   class="form-control"
                   th:field="*{rentDate}">

        </div>

        <div class="mb-3">

            <label>Return Date</label>

            <input type="date"
                   class="form-control"
                   th:field="*{returnDate}">

        </div>

        <div class="mb-3">

            <label>Total Amount</label>

            <input type="number"
                   class="form-control"
                   th:field="*{totalAmount}">

        </div>

        <button class="btn btn-success">
            Rent Vehicle
        </button>

    </form>

</div>

</body>

</html>
