<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Vehicle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Add New Vehicle</h2>

    <form th:action="@{/saveVehicle}" th:object="${vehicle}" method="post">

        <div class="mb-3">
            <label>Vehicle Number</label>
            <input type="text" class="form-control" th:field="*{vehicleNumber}">
        </div>

        <div class="mb-3">
            <label>Brand</label>
            <input type="text" class="form-control" th:field="*{brand}">
        </div>

        <div class="mb-3">
            <label>Model</label>
            <input type="text" class="form-control" th:field="*{model}">
        </div>

        <div class="mb-3">
            <label>Type</label>
            <input type="text" class="form-control" th:field="*{type}">
        </div>

        <div class="mb-3">
            <label>Year</label>
            <input type="number" class="form-control" th:field="*{year}">
        </div>

        <div class="mb-3">
            <label>Price Per Day</label>
            <input type="number" step="0.01" class="form-control" th:field="*{pricePerDay}">
        </div>

        <button class="btn btn-success">
            Save Vehicle
        </button>

    </form>

</div>

</body>

</html>
