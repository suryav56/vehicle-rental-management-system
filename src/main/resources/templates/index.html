<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Vehicle Rental Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            🚗 Vehicle Rental
        </a>

        <div class="navbar-nav">

            <a class="nav-link" href="/">Dashboard</a>

            <a class="nav-link" href="/vehicles">Vehicles</a>

            <a class="nav-link" href="/customers">Customers</a>

            <a class="nav-link" href="/rentals">Rentals</a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="text-center">

        <h1 class="mb-4">
            🚗 Vehicle Rental Management System
        </h1>

        <p class="lead">
            Manage Vehicles, Customers and Rentals
        </p>

    </div>

    <div class="row text-center mb-5">

        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <h3 th:text="${vehicleCount}"></h3>
                    <p>Total Vehicles</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h3 th:text="${availableCount}"></h3>
                    <p>Available</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-warning text-dark">
                <div class="card-body">
                    <h3 th:text="${customerCount}"></h3>
                    <p>Customers</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white">
                <div class="card-body">
                    <h3 th:text="${rentalCount}"></h3>
                    <p>Rentals</p>
                </div>
            </div>
        </div>

    </div>

    <div class="row mt-5">

        <div class="col-md-4">

            <div class="card shadow-lg border-0">

                <div class="card-body text-center">

                    <h3>🚘 Vehicles</h3>

                    <p>Manage vehicle inventory</p>

                    <a href="/vehicles"
                       class="btn btn-primary">

                        Open

                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow-lg border-0">

                <div class="card-body text-center">

                    <h3>👤 Customers</h3>

                    <p>Manage customers</p>

                    <a href="/customers"
                       class="btn btn-success">

                        Open

                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow-lg border-0">

                <div class="card-body text-center">

                    <h3>📋 Rentals</h3>

                    <p>Manage rentals</p>

                    <a href="/rentals"
                       class="btn btn-warning">

                        Open

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
