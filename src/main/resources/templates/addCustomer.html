<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Customer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Add Customer</h2>

    <form th:action="@{/saveCustomer}"
          th:object="${customer}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">

            <label>Name</label>

            <input type="text"
                   class="form-control"
                   th:field="*{name}">

        </div>

        <div class="mb-3">

            <label>Phone</label>

            <input type="text"
                   class="form-control"
                   th:field="*{phone}">

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input type="email"
                   class="form-control"
                   th:field="*{email}">

        </div>

        <div class="mb-3">

            <label>License Number</label>

            <input type="text"
                   class="form-control"
                   th:field="*{licenseNumber}">

        </div>

        <button class="btn btn-success">
            Save Customer
        </button>

    </form>

</div>

</body>

</html>
