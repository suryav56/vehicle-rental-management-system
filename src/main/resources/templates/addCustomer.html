<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Customer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            🚗 Vehicle Rental
        </a>

        <div class="navbar-nav">

            <a class="nav-link" href="/">Dashboard</a>

            <a class="nav-link" href="/vehicles">Vehicles</a>

            <a class="nav-link" href="/customers">Customers</a>

            <a class="nav-link" href="/rentals">Rentals</a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2>Add Customer</h2>

    <form th:action="@{/saveCustomer}"
          th:object="${customer}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">

            <label>Name</label>

            <input type="text"
                   class="form-control"
                   th:field="*{name}">

        </div>

        <div class="mb-3">

            <label>Phone</label>

            <input type="text"
                   class="form-control"
                   th:field="*{phone}">

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input type="email"
                   class="form-control"
                   th:field="*{email}">

        </div>

        <div class="mb-3">

            <label>License Number</label>

            <input type="text"
                   class="form-control"
                   th:field="*{licenseNumber}">

        </div>

        <button class="btn btn-success">
            Save Customer
        </button>

    </form>

</div>

</body>

</html>
